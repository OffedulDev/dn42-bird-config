protocol kernel {
    scan time 20;

    ipv4 {
        import none;
        export filter {
            krt_prefsrc = OUR_IP;
            if source ~ [RTS_BGP, RTS_OSPF] then {
                accept;
            } else reject;
        };
    };
}

protocol kernel {
    scan time 20;

    ipv6 {
        import none;
        export filter {
            krt_prefsrc = OUR_IP_V6;
            if source ~ [RTS_BGP, RTS_OSPF] then {
                accept;
            } else reject;
        };
    };
}